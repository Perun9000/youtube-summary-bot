services:
  bot:
    build: .
    env_file:
      - .env
    volumes:
      - ./data:/data
    ports:
      - "127.0.0.1:8799:8799"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
